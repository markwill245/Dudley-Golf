<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dudley Golf Club | Heritage & Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A367; --forest: #1b3022; --cream: #F9F7F2; --paper: #ffffff; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--cream); color: var(--forest); scroll-behavior: smooth; }
        h1, h2, h3, h4, .serif { font-family: 'Cormorant Garamond', serif; }
        
        .nav-blur { backdrop-filter: blur(12px); background: rgba(27, 48, 34, 0.95); }
        .btn-gold { background: var(--gold); color: white; transition: all 0.3s ease; }
        .btn-gold:hover { background: white; color: var(--forest); }
        
        /* Mobile Hole Card Styling */
        .hole-card { min-width: 140px; flex-shrink: 0; }
        @media (min-width: 768px) { .hole-card { min-width: 100%; } }

        .hole-card.active { border-bottom: 4px solid var(--gold); background: white; }
        @media (min-width: 768px) { .hole-card.active { border-bottom: none; border-left: 4px solid var(--gold); } }

        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--gold); }
        
        section { padding: 60px 20px; }
        .hero-bg { 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?q=80');
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body class="antialiased">

    <div class="bg-[#0f1a13] text-white/70 py-2 px-8 flex justify-between items-center text-[10px] tracking-[0.2em] uppercase border-b border-white/5">
        <div id="live-clock">Loading...</div>
        <div class="flex gap-6">
            <span id="weather">Dudley: 14°C</span>
            <span>Course Status: <span class="text-green-400">Open</span></span>
        </div>
    </div>

    <nav class="sticky top-0 w-full z-50 px-8 py-4 flex justify-between items-center text-white nav-blur border-b border-white/10">
        <a href="#" class="flex flex-col">
            <span class="serif text-2xl tracking-widest leading-none">DUDLEY</span>
            <span class="text-[8px] tracking-[0.4em] uppercase text-gold">Golf Club Est. 1893</span>
        </a>
        <div class="hidden md:flex gap-10 text-[10px] uppercase tracking-[0.2em] font-semibold">
            <a href="#" class="hover:text-gold transition">Home</a>
            <a href="#course" class="hover:text-gold transition">Course Guide</a>
            <a href="#membership" class="hover:text-gold transition">Membership</a>
            <a href="https://www.dudleygolfclub.com/visitorbooking/" target="_blank" class="hover:text-gold transition">Visitor Booking</a>
        </div>
        <a href="https://www.dudleygolfclub.com/login.php" target="_blank" class="border border-gold text-gold px-5 py-2 text-[10px] uppercase tracking-widest font-bold hover:bg-gold hover:text-white transition">
            Member Login
        </a>
    </nav>

    <header class="hero-bg h-[60vh] flex items-center justify-center text-center text-white">
        <div class="max-w-4xl px-4">
            <h1 class="text-5xl md:text-8xl font-light mb-6">Heritage in every <span class="italic">detail.</span></h1>
            <div class="w-24 h-1 bg-gold mx-auto mb-8"></div>
            <p class="text-[10px] md:text-sm tracking-[0.3em] uppercase opacity-90">The Black Country's Premier Parkland Course</p>
        </div>
    </header>

    <section id="course" class="max-w-7xl mx-auto px-4">
        <div class="flex flex-col md:flex-row gap-8">
            <div class="md:w-1/3">
                <h2 class="serif text-4xl mb-6">The 18 Holes</h2>
                <div id="hole-nav-container" class="flex md:flex-col overflow-x-auto md:overflow-y-auto custom-scrollbar gap-2 pb-4 md:h-[600px]">
                    </div>
            </div>

            <div class="md:w-2/3 bg-white border border-gray-100 shadow-xl overflow-hidden rounded-sm flex flex-col">
                <div class="aspect-video md:h-1/2 overflow-hidden bg-gray-200">
                    <img id="h-img" src="" class="w-full h-full object-cover transition-opacity duration-500" onerror="this.src='https://images.unsplash.com/photo-1535131749006-b7f58c99034b?q=80'">
                </div>
                <div class="p-6 md:p-10">
                    <div class="flex justify-between items-start mb-4">
                        <h3 id="h-name" class="serif text-3xl md:text-4xl text-forest"></h3>
                        <span id="h-num" class="serif text-4xl md:text-5xl text-gold/20 italic leading-none"></span>
                    </div>
                    
                    <div class="grid grid-cols-4 gap-2 md:gap-4 mb-6 border-y border-gray-100 py-4">
                        <div><p class="text-[8px] uppercase text-gray-400">Par/SI</p><p id="h-par-si" class="text-[11px] md:text-sm font-semibold"></p></div>
                        <div class="text-center"><p class="text-[8px] uppercase text-gray-400">White</p><p id="h-white" class="text-[11px] md:text-sm font-bold"></p></div>
                        <div class="text-center"><p class="text-[8px] uppercase text-gray-400">Yellow</p><p id="h-yellow" class="text-[11px] md:text-sm font-bold text-amber-600"></p></div>
                        <div class="text-center"><p class="text-[8px] uppercase text-gray-400">Red</p><p id="h-red" class="text-[11px] md:text-sm font-bold text-red-600"></p></div>
                    </div>

                    <p id="h-desc" class="text-gray-500 italic mb-6 text-sm"></p>
                    <div class="bg-forest p-4 text-white text-xs border-l-4 border-gold">
                        <strong class="text-gold uppercase block mb-1">Pro Tip:</strong>
                        <span id="h-tip"></span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="membership" class="bg-[#142419] text-white">
        <div class="max-w-7xl mx-auto">
            <div class="text-center mb-12">
                <h2 class="serif text-5xl mb-4 text-gold">Membership</h2>
            </div>
            <div class="grid md:grid-cols-3 gap-6" id="membership-grid"></div>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-400 text-[9px] uppercase tracking-[0.4em]">
        Dudley Golf Club • © <span id="year"></span>
    </footer>

    <script>
        const courseData = {
            1: { name: "The Dog-Leg", img: "images/hole1.webp", w: 483, y: 473, r: 464, par: 5, si: 9, tip: "A straight tee shot is required to a long left sweeping fairway.", desc: "A challenging start to the round requiring precision from the tee." },
            2: { name: "Risk & Reward", img: "images/hole2.webp", w: 257, y: 251, r: 167, par: "4/3", si: "17/11", tip: "A steady tee shot followed by an accurate pitch to a narrow raised green.", desc: "Test your nerve on this tactical short hole." },
            3: { name: "Marker Pole", img: "images/hole3.webp", w: 443, y: 433, r: 421, par: "4/5", si: 1, tip: "A difficult blind straight tee shot.", desc: "Take note of the horizontal dry ditch across the fairway." },
            4: { name: "The Stamp", img: "images/hole4.webp", w: 143, y: 131, r: 119, par: 3, si: 13, tip: "Our own postage stamp hole with a bunker across the front.", desc: "Short but dangerous. Club selection is everything." },
            5: { name: "The Plateau", img: "images/hole5.webp", w: 425, y: 415, r: 334, par: 4, si: "3/17", tip: "Steady shot onto the top of a plateau fairway.", desc: "The first hole of our famous 'Amen Corner'." },
            6: { name: "Hells Corner", img: "images/hole6.webp", w: 182, y: 174, r: 159, par: 3, si: "7/9", tip: "A long difficult hole to a right to left sloping green.", desc: "The second challenge of Amen Corner." },
            7: { name: "The Bank", img: "images/hole7.webp", w: 199, y: 180, r: 150, par: 3, si: "5/7", tip: "Very little room for manoeuvre.", desc: "The finale of Amen Corner." },
            8: { name: "The Summit", img: "images/hole8.webp", w: 298, y: 291, r: 272, par: 4, si: "15/5", tip: "Outstanding views across several counties.", desc: "The peak of the course with breathtaking panoramas." },
            9: { name: "Devils Horns", img: "images/hole9.webp", w: 388, y: 382, r: 314, par: 4, si: "11/15", tip: "Everything falls right onto the green.", desc: "A tight fairway that tests your ability to play the slopes." },
            10: { name: "The Dell", img: "images/hole10.webp", w: 322, y: 310, r: 251, par: 4, si: "16/14", tip: "A straight forward hole onto a slightly raised green.", desc: "Accuracy is rewarded on this scenic par 4." },
            11: { name: "The Trap", img: "images/hole11.webp", w: 173, y: 163, r: 105, par: 3, si: "10/18", tip: "Bunkers either side to be aware of.", desc: "Stay centered to avoid the sand traps." },
            12: { name: "Calm", img: "images/hole12.webp", w: 269, y: 264, r: 258, par: 4, si: "18/16", tip: "Possible to hit the green with a good tee shot.", desc: "A generous fairway offering a real birdie opportunity." },
            13: { name: "Blind Ascent", img: "images/hole13.webp", w: 523, y: 452, r: 442, par: 5, si: "6/8", tip: "A late dogleg left after one or two downhill shots.", desc: "A long journey home requiring strong ball striking." },
            14: { name: "The Snap", img: "images/hole14.webp", w: 174, y: 168, r: 154, par: 3, si: "14/12", tip: "A slightly downhill green requires an accurate tee shot.", desc: "A beautiful drop shot par 3." },
            15: { name: "The Climb", img: "images/hole15.webp", w: 304, y: 298, r: 294, par: 4, si: "8/2", tip: "Uphill ground makes it longer than you think.", desc: "Don't let the yardage fool you." },
            16: { name: "High Pressure", img: "images/hole16.webp", w: 436, y: 430, r: 419, par: "4/5", si: "2/4", tip: "A very tough long hole with a ditch.", desc: "Tests your nerve and power." },
            17: { name: "The Firs", img: "images/hole17.webp", w: 416, y: 406, r: 392, par: "4/5", si: "4/10", tip: "A par requires four very good shots.", desc: "A demanding hole as you approach the clubhouse." },
            18: { name: "The Finale", img: "images/hole18.webp", w: 318, y: 308, r: 298, par: 4, si: "12/6", tip: "A slight dogleg right brings you home.", desc: "A finishing hole in front of the members." }
        };

        const membershipData = [
            { name: "Full Member", price: "£1150", period: "per year", desc: "Unlimited golf 7 days a week, full competition entry." },
            { name: "7 Day Restricted", price: "£860", period: "per year", desc: "For those with a busy lifestyle." },
            { name: "Junior Member", price: "£50", period: "per year", desc: "Under 18s. Supporting the future." }
        ];

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
            document.getElementById('year').innerText = now.getFullYear();
        }
        setInterval(updateClock, 1000); updateClock();

        function setHole(n) {
            const h = courseData[n];
            document.getElementById('h-num').innerText = n.toString().padStart(2, '0');
            document.getElementById('h-name').innerText = h.name;
            document.getElementById('h-par-si').innerText = `P${h.par} / S${h.si}`;
            document.getElementById('h-white').innerText = h.w;
            document.getElementById('h-yellow').innerText = h.y;
            document.getElementById('h-red').innerText = h.r;
            document.getElementById('h-desc').innerText = h.desc;
            document.getElementById('h-tip').innerText = h.tip;
            
            // CACHE BUSTER: Added ?v= + date to force the phone to download the new image
            document.getElementById('h-img').src = './' + h.img + '?v=' + Date.now();
            
            document.querySelectorAll('.hole-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`h-${n}`).classList.add('active');
        }

        const navCont = document.getElementById('hole-nav-container');
        for (let i = 1; i <= 18; i++) {
            const div = document.createElement('div');
            div.id = `h-${i}`;
            div.className = "hole-card p-4 border border-gray-100 cursor-pointer transition-all bg-white/50 md:bg-transparent";
            div.innerHTML = `<p class="text-[10px] uppercase font-bold tracking-widest text-forest">Hole ${i}</p><p class="serif italic text-gray-400 text-xs">${courseData[i].name}</p>`;
            div.onclick = () => {
                setHole(i);
                // On mobile, scroll the selection into view
                if(window.innerWidth < 768) {
                    div.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            };
            navCont.appendChild(div);
        }
        setHole(1);

        const mGrid = document.getElementById('membership-grid');
        membershipData.forEach(m => {
            mGrid.innerHTML += `
                <div class="p-6 border border-white/10 bg-white/5">
                    <h4 class="serif text-xl mb-2">${m.name}</h4>
                    <p class="text-2xl font-bold text-gold mb-2">${m.price}</p>
                    <p class="text-[11px] text-gray-400 leading-relaxed">${m.desc}</p>
                </div>
            `;
        });
    </script>
</body>
</html>
